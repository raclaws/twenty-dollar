services:
  app:
    image: ghcr.io/raclaws/twenty-dollar:master
    container_name: twenty-dollar
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    environment:
      - DATABASE_PATH=/app/data/twenty_dollar.db
      - STATIC_DIR=/app/static
      - RUST_LOG=${RUST_LOG:-twenty_dollar=info,tower_http=info}
      - INSECURE_COOKIES=${INSECURE_COOKIES:-0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
