# Pull pre-built image from GHCR (no build needed)
# Usage: docker compose -f docker-compose.hub.yml up -d
services:
  app:
    image: ghcr.io/raclaws/twenty-dollar:master
    container_name: twenty-dollar
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    environment:
      - DATABASE_PATH=/app/data/twenty_dollar.db
      - STATIC_DIR=/app/static
      - RUST_LOG=${RUST_LOG:-twenty_dollar=info,tower_http=info}
