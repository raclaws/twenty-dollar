meta:
  project: "twenty-dollar-react-v2"
  spec_dir: "/root/twenty-dollar/react-v2/specs"

entities:
  Session:
    - none
    - valid
    - expired
  Account:
    - active
    - closed
  Payee:
    - active
  CategoryGroup:
    - active
  Category:
    - active
    - hidden
  Transaction:
    - uncleared
    - cleared
    - reconciled
  SplitEntry:
    - exists
  Assignment:
    - exists
  Schedule:
    - active
    - paused
    - expired
  ImportRule:
    - exists
  MonthLock:
    - unlocked
    - locked
  Sync:
    - online
    - offline
    - syncing
    - error

operations:
  # === AUTH FETCH ops ===
  - name: "POST /auth/login"
    touches: ["Session"]
  - name: "POST /auth/logout"
    touches: ["Session"]
  - name: "GET /auth/check"
    touches: ["Session"]

  # === ACCOUNT FETCH ops ===
  - name: "GET /api/accounts"
    touches: ["Account", "Session"]
  - name: "POST /api/accounts"
    touches: ["Account", "Payee", "Session"]
  - name: "PATCH /api/accounts/:id"
    touches: ["Account", "Session"]
  - name: "DELETE /api/accounts/:id"
    touches: ["Account", "Transaction", "Session"]
  - name: "PUT /api/accounts/reorder"
    touches: ["Account", "Session"]

  # === PAYEE FETCH ops ===
  - name: "GET /api/payees"
    touches: ["Payee", "Session"]
  - name: "POST /api/payees"
    touches: ["Payee", "Session"]
  - name: "PATCH /api/payees/:id"
    touches: ["Payee", "Session"]
  - name: "DELETE /api/payees/:id"
    touches: ["Payee", "Transaction", "Session"]

  # === CATEGORY GROUP FETCH ops ===
  - name: "GET /api/category-groups"
    touches: ["CategoryGroup", "Category", "Session"]
  - name: "POST /api/category-groups"
    touches: ["CategoryGroup", "Session"]
  - name: "PATCH /api/category-groups/:id"
    touches: ["CategoryGroup", "Session"]
  - name: "DELETE /api/category-groups/:id"
    touches: ["CategoryGroup", "Category", "Session"]
  - name: "PUT /api/category-groups/reorder"
    touches: ["CategoryGroup", "Session"]

  # === CATEGORY FETCH ops ===
  - name: "POST /api/categories"
    touches: ["Category", "CategoryGroup", "Session"]
  - name: "PATCH /api/categories/:id"
    touches: ["Category", "CategoryGroup", "Session"]
  - name: "DELETE /api/categories/:id"
    touches: ["Category", "Transaction", "SplitEntry", "Session"]
  - name: "PUT /api/categories/reorder"
    touches: ["Category", "Session"]

  # === TRANSACTION FETCH ops ===
  - name: "GET /api/transactions"
    touches: ["Transaction", "Account", "Session"]
  - name: "POST /api/transactions"
    touches: ["Transaction", "Account", "Payee", "Category", "SplitEntry", "Session"]
  - name: "PATCH /api/transactions/:id"
    touches: ["Transaction", "Account", "Session"]
  - name: "DELETE /api/transactions/:id"
    touches: ["Transaction", "SplitEntry", "Session"]
  - name: "POST /api/transactions/bulk"
    touches: ["Transaction", "SplitEntry", "Category", "Session"]
  - name: "PUT /api/transactions/:id/splits"
    touches: ["SplitEntry", "Transaction", "Category", "Session"]

  # === ASSIGNMENT FETCH ops ===
  - name: "GET /api/assignments"
    touches: ["Assignment", "Session"]
  - name: "PUT /api/assignments"
    touches: ["Assignment", "Category", "MonthLock", "Session"]
  - name: "POST /api/assignments/move"
    touches: ["Assignment", "Category", "MonthLock", "Session"]

  # === SCHEDULE FETCH ops ===
  - name: "GET /api/schedules"
    touches: ["Schedule", "Session"]
  - name: "POST /api/schedules"
    touches: ["Schedule", "Account", "Payee", "Session"]
  - name: "PATCH /api/schedules/:id"
    touches: ["Schedule", "Session"]
  - name: "DELETE /api/schedules/:id"
    touches: ["Schedule", "Session"]
  - name: "POST /api/schedules/generate"
    touches: ["Schedule", "Transaction", "Account", "Session"]

  # === IMPORT RULE FETCH ops ===
  - name: "GET /api/import-rules"
    touches: ["ImportRule", "Session"]
  - name: "POST /api/import-rules"
    touches: ["ImportRule", "Session"]
  - name: "PATCH /api/import-rules/:id"
    touches: ["ImportRule", "Session"]
  - name: "DELETE /api/import-rules/:id"
    touches: ["ImportRule", "Session"]

  # === MONTH LOCK FETCH ops ===
  - name: "GET /api/month-locks"
    touches: ["MonthLock", "Session"]
  - name: "POST /api/month-locks"
    touches: ["MonthLock", "Session"]
  - name: "DELETE /api/month-locks/:month"
    touches: ["MonthLock", "Session"]

  # === IMPORT/EXPORT FETCH ops ===
  - name: "POST /api/import/csv"
    touches: ["Transaction", "Payee", "Account", "ImportRule", "Session"]
  - name: "GET /api/export"
    touches: ["Account", "Payee", "CategoryGroup", "Category", "Transaction", "SplitEntry", "Assignment", "Schedule", "ImportRule", "MonthLock", "Session"]

  # === SSE FETCH op ===
  - name: "GET /api/events"
    touches: ["Sync", "Session"]

  # === HYDRATION FETCH op ===
  - name: "GET /api/hydrate"
    touches: ["Account", "Payee", "CategoryGroup", "Category", "Transaction", "SplitEntry", "Assignment", "Schedule", "ImportRule", "MonthLock", "Session"]

  # === NAV ops (one per route) ===
  - name: "navigate_to_budget"
    touches: ["Session"]
  - name: "navigate_to_budget_month"
    touches: ["Session"]
  - name: "navigate_to_accounts"
    touches: ["Session"]
  - name: "navigate_to_account_ledger"
    touches: ["Session", "Account"]
  - name: "navigate_to_account_transactions"
    touches: ["Session", "Account"]
  - name: "navigate_to_schedules"
    touches: ["Session"]
  - name: "navigate_to_import"
    touches: ["Session", "Account"]
  - name: "navigate_to_settings"
    touches: ["Session"]
  - name: "navigate_to_settings_categories"
    touches: ["Session"]
  - name: "navigate_to_settings_payees"
    touches: ["Session"]
  - name: "navigate_to_settings_import_rules"
    touches: ["Session"]
  - name: "navigate_to_settings_export"
    touches: ["Session"]
  - name: "navigate_to_login"
    touches: ["Session"]

  # === TIMER ops ===
  - name: "undo_timer_expire"
    touches: ["Transaction", "Assignment", "Category"]
  - name: "sse_reconnect"
    touches: ["Sync"]
  - name: "session_expire"
    touches: ["Session"]
  - name: "sse_heartbeat"
    touches: ["Sync"]
  - name: "assignment_debounce"
    touches: ["Assignment"]
  - name: "offline_queue_flush"
    touches: ["Sync", "Transaction", "Assignment"]

  # === UI ops ===
  - name: "drag_category_sort"
    touches: ["Category", "CategoryGroup"]
  - name: "drag_category_group_sort"
    touches: ["CategoryGroup"]
  - name: "drag_account_sort"
    touches: ["Account"]
  - name: "inline_edit_account_name"
    touches: ["Account"]
  - name: "inline_edit_assignment"
    touches: ["Assignment", "Category", "MonthLock"]
  - name: "inline_edit_transaction"
    touches: ["Transaction", "Account", "Category", "Payee"]
  - name: "inline_edit_category_target"
    touches: ["Category"]
  - name: "inline_edit_import_rule"
    touches: ["ImportRule"]
  - name: "bulk_select_transactions"
    touches: ["Transaction"]
  - name: "command_palette_open"
    touches: ["Session"]
  - name: "split_editor_add_row"
    touches: ["SplitEntry", "Transaction"]
  - name: "toggle_schedule_pause"
    touches: ["Schedule"]

spec_coverage:
  # Auth
  - ["Session=none", "POST /auth/login", "returns 200 + session cookie on valid creds"]
  - ["Session=none", "POST /auth/login", "returns 401 on invalid creds"]
  - ["Session=valid", "POST /auth/logout", "returns 200, clears session"]
  - ["Session=valid", "GET /auth/check", "returns authenticated=true"]
  - ["Session=none", "GET /auth/check", "returns authenticated=false"]
  - ["Session=expired", "*", "returns 401 SESSION_EXPIRED"]
  - ["Session=none", "*", "returns 401 SESSION_INVALID for protected endpoints"]

  # Accounts
  - ["Account=active", "POST /api/accounts", "returns 201 + auto-creates payee"]
  - ["Account=active", "POST /api/accounts", "returns 409 DUPLICATE_NAME on name collision"]
  - ["Account=active", "PATCH /api/accounts/:id", "returns 200 with updated account"]
  - ["Account=active", "PATCH /api/accounts/:id", "returns 409 DUPLICATE_NAME"]
  - ["Account=active", "DELETE /api/accounts/:id", "returns 200 soft-deletes if no txns"]
  - ["Account=active, Transaction=exists", "DELETE /api/accounts/:id", "returns 409 DELETE_GUARD"]
  - ["Account=closed", "GET /api/accounts", "excluded from results"]
  - ["Account=active", "PUT /api/accounts/reorder", "returns 200 updates sort_order"]

  # Payees
  - ["Payee=active", "POST /api/payees", "returns 201"]
  - ["Payee=active", "POST /api/payees", "returns 409 DUPLICATE_NAME"]
  - ["Payee=active", "PATCH /api/payees/:id", "returns 200"]
  - ["Payee=active, Transaction=exists", "DELETE /api/payees/:id", "returns 409 DELETE_GUARD"]

  # Category Groups
  - ["CategoryGroup=active", "POST /api/category-groups", "returns 201"]
  - ["CategoryGroup=active", "POST /api/category-groups", "returns 409 DUPLICATE_NAME"]
  - ["CategoryGroup=active, Category=active", "DELETE /api/category-groups/:id", "returns 409 DELETE_GUARD"]
  - ["CategoryGroup=active", "DELETE /api/category-groups/:id", "returns 200 if empty"]
  - ["CategoryGroup=active", "PUT /api/category-groups/reorder", "returns 200"]

  # Categories
  - ["Category=active", "POST /api/categories", "returns 201"]
  - ["Category=active", "POST /api/categories", "returns 409 DUPLICATE_NAME in group"]
  - ["Category=active", "PATCH /api/categories/:id", "returns 200 allows group reassignment"]
  - ["Category=active, Transaction=exists", "DELETE /api/categories/:id", "returns 409 DELETE_GUARD"]
  - ["Category=active, SplitEntry=exists", "DELETE /api/categories/:id", "returns 409 DELETE_GUARD"]
  - ["Category=active", "PUT /api/categories/reorder", "returns 200"]

  # Transactions
  - ["Transaction=uncleared", "POST /api/transactions", "returns 201"]
  - ["Transaction=uncleared", "POST /api/transactions", "returns 422 if amount=0"]
  - ["Transaction=uncleared", "POST /api/transactions", "returns 422 SPLIT_SUM_MISMATCH"]
  - ["Transaction=uncleared", "POST /api/transactions", "creates mirror for transfer payee"]
  - ["Transaction=uncleared", "PATCH /api/transactions/:id", "returns 200"]
  - ["Transaction=uncleared", "PATCH /api/transactions/:id", "propagates to mirror if transfer"]
  - ["Transaction=uncleared", "DELETE /api/transactions/:id", "returns 200, cascades splits"]
  - ["Transaction=uncleared", "DELETE /api/transactions/:id", "deletes mirror if transfer"]
  - ["Transaction=cleared", "POST /api/transactions/bulk", "action=delete removes all + mirrors"]
  - ["Transaction=uncleared", "POST /api/transactions/bulk", "action=clear sets cleared=1"]
  - ["Transaction=cleared", "POST /api/transactions/bulk", "action=unclear sets cleared=0"]
  - ["Transaction=uncleared", "POST /api/transactions/bulk", "action=categorize sets category_id"]
  - ["Transaction=uncleared", "PUT /api/transactions/:id/splits", "replaces splits atomically"]
  - ["Transaction=uncleared", "PUT /api/transactions/:id/splits", "returns 422 SPLIT_SUM_MISMATCH"]

  # Assignments
  - ["Assignment=exists", "PUT /api/assignments", "upserts for category+month"]
  - ["MonthLock=locked", "PUT /api/assignments", "returns 409 MONTH_LOCKED"]
  - ["Assignment=exists", "POST /api/assignments/move", "adjusts two assignments atomically"]
  - ["MonthLock=locked", "POST /api/assignments/move", "returns 409 MONTH_LOCKED"]
  - ["Assignment=exists", "POST /api/assignments/move", "returns 422 if from=to"]
  - ["Assignment=exists", "POST /api/assignments/move", "returns 422 if amount<=0"]

  # Schedules
  - ["Schedule=active", "POST /api/schedules", "returns 201, next_due=start_date"]
  - ["Schedule=active", "POST /api/schedules/generate", "creates transactions for due schedules"]
  - ["Schedule=paused", "POST /api/schedules/generate", "skipped"]
  - ["Schedule=expired", "POST /api/schedules/generate", "skipped, does not advance"]
  - ["Schedule=active", "PATCH /api/schedules/:id", "returns 200"]
  - ["Schedule=active", "DELETE /api/schedules/:id", "returns 200, no cascade to generated txns"]

  # Import Rules
  - ["ImportRule=exists", "POST /api/import-rules", "returns 201"]
  - ["ImportRule=exists", "PATCH /api/import-rules/:id", "returns 200"]
  - ["ImportRule=exists", "DELETE /api/import-rules/:id", "returns 200"]
  - ["ImportRule=exists", "POST /api/import/csv", "rules applied case-insensitive, first match wins"]

  # Month Locks
  - ["MonthLock=unlocked", "POST /api/month-locks", "returns 201 creates lock"]
  - ["MonthLock=locked", "POST /api/month-locks", "returns 409 ALREADY_LOCKED"]
  - ["MonthLock=locked", "DELETE /api/month-locks/:month", "returns 200 unlocks"]
  - ["MonthLock=unlocked", "DELETE /api/month-locks/:month", "returns 404 NOT_FOUND"]
  - ["MonthLock=locked", "POST /api/transactions", "allowed (lock does not block txns)"]

  # Import/Export
  - ["Account=active", "POST /api/import/csv", "returns 200 with imported/skipped/errors"]
  - ["Account=active", "POST /api/import/csv", "returns 422 if missing account_id"]
  - ["*", "GET /api/export", "returns all entity tables as JSON"]

  # SSE
  - ["Sync=online", "GET /api/events", "returns text/event-stream"]
  - ["Session=valid", "GET /api/events", "broadcasts entity_created/updated/deleted"]
  - ["Sync=online", "sse_heartbeat", "sent every 30s"]
  - ["Sync=offline", "sse_reconnect", "reconnects with Last-Event-ID replay"]
  - ["Session=none", "GET /api/events", "returns 401"]

  # Hydration
  - ["Session=valid", "GET /api/hydrate", "returns all tables + server_time"]

  # Offline CRUD coverage
  - ["Sync=offline", "POST /api/transactions", "writes to IDB, queues for sync"]
  - ["Sync=offline", "PUT /api/assignments", "writes to IDB, queues for sync"]
  - ["Sync=offline", "POST /api/accounts", "writes to IDB, queues for sync"]
  - ["Sync=offline", "PATCH /api/transactions/:id", "writes to IDB, queues for sync"]
  - ["Sync=offline", "DELETE /api/transactions/:id", "writes to IDB, queues for sync"]
  - ["Sync=offline", "POST /api/import/csv", "writes to IDB, syncs later"]
  - ["Sync=offline", "GET /api/export", "reads from IDB, always available"]
  - ["Sync=offline", "POST /api/assignments/move", "writes to IDB, queues for sync"]

  # UI operations
  - ["Category=active", "drag_category_sort", "sort_order persists on drop"]
  - ["CategoryGroup=active", "drag_category_group_sort", "sort_order persists on drop"]
  - ["Account=active", "drag_account_sort", "sort_order persists on drop"]
  - ["Account=active", "inline_edit_account_name", "saves on Enter, cancels on Escape"]
  - ["MonthLock=unlocked", "inline_edit_assignment", "saves on Enter/Tab, undo toast 5s"]
  - ["MonthLock=locked", "inline_edit_assignment", "cell is read-only"]
  - ["Transaction=uncleared", "inline_edit_transaction", "saves on Enter, cancels on Escape"]
  - ["Category=active", "inline_edit_category_target", "saves target type/amount/date"]
  - ["Transaction=uncleared", "bulk_select_transactions", "enables bulk action bar"]

  # Undo/Timer
  - ["Assignment=exists", "undo_timer_expire", "undo option removed after 5s"]
  - ["Sync=offline", "sse_reconnect", "exponential backoff reconnect"]
  - ["Session=valid", "session_expire", "redirects to login after 24h"]

  # NAV
  - ["Session=valid", "navigate_to_budget", "renders budget grid for current month"]
  - ["Session=valid", "navigate_to_accounts", "renders account cards by type"]
  - ["Session=valid", "navigate_to_account_ledger", "renders transaction list for account"]
  - ["Session=valid", "navigate_to_schedules", "renders schedule list"]
  - ["Session=valid", "navigate_to_import", "renders CSV import wizard"]
  - ["Session=valid", "navigate_to_settings", "renders settings shell"]
  - ["Session=none", "navigate_to_login", "renders login form"]

