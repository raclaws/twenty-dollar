reachability_constraints:
  - rule: "Protected endpoints require valid session"
    condition: "Session == 'none' and operation != 'POST /auth/login' and operation != 'GET /auth/check' and operation != 'navigate_to_login'"
  - rule: "Locked month blocks assignment writes"
    condition: "MonthLock == 'locked' and (operation == 'PUT /api/assignments' or operation == 'POST /api/assignments/move' or operation == 'inline_edit_assignment')"
  - rule: "Expired schedule does not generate"
    condition: "Schedule == 'expired' and operation == 'POST /api/schedules/generate'"
  - rule: "Paused schedule does not generate"
    condition: "Schedule == 'paused' and operation == 'POST /api/schedules/generate'"
  - rule: "Cannot delete account with transactions"
    condition: "Account == 'active' and Transaction == 'exists_for_account' and operation == 'DELETE /api/accounts/:id'"
  - rule: "Cannot delete category group with children"
    condition: "CategoryGroup == 'active' and Category == 'active_in_group' and operation == 'DELETE /api/category-groups/:id'"
  - rule: "Cannot delete category with transactions"
    condition: "Category == 'active' and Transaction == 'references_category' and operation == 'DELETE /api/categories/:id'"
  - rule: "SSE requires valid session"
    condition: "Session == 'none' and operation == 'GET /api/events'"
  - rule: "Transfer cannot target same account"
    condition: "Account == 'same_source_and_target' and operation == 'POST /api/transactions'"
